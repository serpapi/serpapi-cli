version: 2

project_name: serpapi

before:
  hooks:
    - go mod download

builds:
  - id: serpapi
    main: ./cmd/serpapi
    binary: serpapi
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/serpapi/serpapi-cli/pkg/version.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "serpapi_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - none*

checksum:
  name_template: "serpapi_{{.Version}}_checksums.txt"

snapshot:
  version_template: "{{.Version}}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

announce:
  skip: true
